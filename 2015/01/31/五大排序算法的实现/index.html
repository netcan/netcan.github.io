pan class="line">184</span><br><span class="line">185</span><br><span class="line">186</span><br><span class="line">187</span><br><span class="line">188</span><br><span class="line">189</span><br><span class="line">190</span><br><span class="line">191</span><br><span class="line">192</span><br><span class="line">193</span><br><span class="line">194</span><br><span class="line">195</span><br><span class="line">196</span><br><span class="line">197</span><br><span class="line">198</span><br></pre></td><td class="code"><pre><span class="line">&#x2F;*************************************************************************</span><br><span class="line">    &gt; File Name: sort.c</span><br><span class="line">    &gt; Author: Netcan</span><br><span class="line">    &gt; Mail: 1469709759@qq.com</span><br><span class="line">    &gt; Created Time: 2014&#x2F;12&#x2F;15 22:14:52</span><br><span class="line"> ************************************************************************&#x2F;</span><br><span class="line"></span><br><span class="line">#include&lt;stdio.h&gt;</span><br><span class="line">#include&lt;stdlib.h&gt;</span><br><span class="line">#include&lt;time.h&gt;</span><br><span class="line">#include&lt;string.h&gt;</span><br><span class="line"></span><br><span class="line">#define LEN 25</span><br><span class="line"></span><br><span class="line">&#x2F;&#x2F; 以下几大排序算法是升序排序</span><br><span class="line">void Show_Num(int *n);          &#x2F;&#x2F; 显示数组的值</span><br><span class="line">void Bubble_Sort(int *n);       &#x2F;&#x2F; 冒泡排序</span><br><span class="line">void Selection_Sort(int *n);    &#x2F;&#x2F; 选择排序</span><br><span class="line">void Shell_Insert_Sort(int *n, int dk); &#x2F;&#x2F; 希尔插入排序</span><br><span class="line">void Shell_Sort(int *n);    &#x2F;&#x2F; 希尔排序</span><br><span class="line">void Quick_Sort(int *n, int first, int last);   &#x2F;&#x2F; 快速排序</span><br><span class="line">void Merge_Array(int *n,int *tmp,int first,int mid,int last); &#x2F;&#x2F; 归并数组</span><br><span class="line">void Merge_Sort(int *n,int *tmp,int first,int last); &#x2F;&#x2F; 归并排序</span><br><span class="line"></span><br><span class="line">int main() &#123;</span><br><span class="line">    static int num[LEN]; &#x2F;&#x2F; 存放LEN个随机数</span><br><span class="line">    static int sort_num[LEN];  &#x2F;&#x2F; 排序后的数组</span><br><span class="line">    static int merge_tmp[LEN];  &#x2F;&#x2F; 归并用的数组</span><br><span class="line">    srand((int)time(0));</span><br><span class="line">    for(int i&#x3D;0; i&lt;LEN; ++i)</span><br><span class="line">        num[i]&#x3D;rand()%100+1; &#x2F;&#x2F; 产生1-100的随机数</span><br><span class="line">    puts(&quot;Orignal Array:&quot;);</span><br><span class="line">    Show_Num(num);  &#x2F;&#x2F; 输出随机值</span><br><span class="line">    memcpy(sort_num, num, LEN*sizeof(int));</span><br><span class="line">    puts(&quot;Bubble_Sort:&quot;);</span><br><span class="line">    Bubble_Sort(sort_num); &#x2F;&#x2F; 冒泡</span><br><span class="line">    Show_Num(sort_num);</span><br><span class="line">    memcpy(sort_num, num, LEN*sizeof(int));</span><br><span class="line">    puts(&quot;Selection_Sort:&quot;);</span><br><span class="line">    Selection_Sort(sort_num); &#x2F;&#x2F; 选择排序</span><br><span class="line">    Show_Num(sort_num);</span><br><span class="line">    memcpy(sort_num, num, LEN*sizeof(int));</span><br><span class="line">    puts(&quot;Insert_Sort:&quot;);</span><br><span class="line">    Shell_Insert_Sort(sort_num,1); &#x2F;&#x2F; 插入排序，dk &#x3D;&#x3D; 1</span><br><span class="line">    Show_Num(sort_num);</span><br><span class="line">    memcpy(sort_num, num, LEN*sizeof(int));</span><br><span class="line">    puts(&quot;Shell_Sort:&quot;);</span><br><span class="line">    Shell_Sort(sort_num); &#x2F;&#x2F; 希尔排序</span><br><span class="line">    Show_Num(sort_num);</span><br><span class="line">    memcpy(sort_num, num, LEN*sizeof(int));</span><br><span class="line">    puts(&quot;Quick_Sort:&quot;);</span><br><span class="line">    Quick_Sort(sort_num, 0, LEN-1); &#x2F;&#x2F; 快速排序</span><br><span class="line">    Show_Num(sort_num);</span><br><span class="line">    memcpy(sort_num, num, LEN*sizeof(int));</span><br><span class="line">    puts(&quot;Merge_Sort:&quot;);</span><br><span class="line">    Merge_Sort(sort_num, merge_tmp, 0, LEN-1); &#x2F;&#x2F; 归并排序</span><br><span class="line">    Show_Num(sort_num);</span><br><span class="line"></span><br><span class="line">    return 0;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">void Show_Num(int *n)</span><br><span class="line">&#123;</span><br><span class="line">    for(int i&#x3D;0; i&lt;LEN; ++i)</span><br><span class="line">        printf(&quot;%4d&quot;,n[i]);</span><br><span class="line">    puts(&quot;&quot;);</span><br><span class="line">    return;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">void Bubble_Sort(int *n)</span><br><span class="line">&#123;</span><br><span class="line">&#x2F;* 冒泡排序</span><br><span class="line"> * 将每个数与其后的数一一比较，</span><br><span class="line"> * 发现比其小的就交换两数的位置</span><br><span class="line"> * 直到该数组遍历完成</span><br><span class="line"> *&#x2F;</span><br><span class="line">    for(int i&#x3D;0;i&lt;LEN;++i)</span><br><span class="line">        for(int j&#x3D;i+1;j&lt;LEN;++j)</span><br><span class="line">            if(n[i]&gt;n[j]) &#123;  &#x2F;&#x2F; 交换数字</span><br><span class="line">                int t&#x3D;n[i];</span><br><span class="line">                n[i]&#x3D;n[j];</span><br><span class="line">                n[j]&#x3D;t;</span><br><span class="line">            &#125;</span><br><span class="line">    return;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">void Selection_Sort(int *n)</span><br><span class="line">&#123;</span><br><span class="line">&#x2F;* 从第一个数开始，遍历其后的数，选出最小的数与第一个数交换</span><br><span class="line"> * 到第二个数，遍历其后的数，选出次最小的数与第二个数交换</span><br><span class="line"> * 一次类推</span><br><span class="line"> * 直到整个数组遍历完</span><br><span class="line"> *&#x2F;</span><br><span class="line">    for(int i&#x3D;0;i&lt;LEN;++i) &#123;</span><br><span class="line">        int mini &#x3D; i;</span><br><span class="line">        for(int j&#x3D;i+1;j&lt;LEN;++j)</span><br><span class="line">            if( n[mini] &gt; n[j] )</span><br><span class="line">                mini &#x3D; j;</span><br><span class="line">        int t&#x3D;n[mini];</span><br><span class="line">        n[mini] &#x3D; n[i];</span><br><span class="line">        n[i] &#x3D; t;</span><br><span class="line">    &#125;</span><br><span class="line">    return;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">void Shell_Insert_Sort(int *n, int dk)</span><br><span class="line">&#123;</span><br><span class="line">&#x2F;* 希尔插入排序，若dk &#x3D;&#x3D; 1则为插入排序，dk为步长</span><br><span class="line"> * 从首个元素(第dk个)开始以步长为dk遍历</span><br><span class="line"> * 若当前元素比其前dk个元素小则开始插入</span><br><span class="line"> * 将数字往右挪，直到空出合适的位置给其插入</span><br><span class="line"> *&#x2F;</span><br><span class="line">    for(int i&#x3D;dk;i&lt;LEN;++i) &#123;</span><br><span class="line">        if(n[i]&lt;n[i-dk]) &#123; &#x2F;&#x2F; 如果该元素比前一个小的话就需要插入</span><br><span class="line">            int t&#x3D;n[i];  &#x2F;&#x2F; 监视哨t用于保存待插入的元素</span><br><span class="line">            int j&#x3D;i-dk;</span><br><span class="line">            for(; j &gt;&#x3D; 0 &amp;&amp; t &lt; n[j]; j-&#x3D;dk) &#x2F;&#x2F; 开始将数值往右挪，直到空出待插入的位置</span><br><span class="line">                n[j+dk]&#x3D;n[j];</span><br><span class="line">            n[j+dk]&#x3D;t; &#x2F;&#x2F; 插入元素</span><br><span class="line">            &#125;</span><br><span class="line">    &#125;</span><br><span class="line">    return;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">void Shell_Sort(int *n)</span><br><span class="line">&#123;</span><br><span class="line">&#x2F;* 希尔排序</span><br><span class="line"> * 每次取dk等于待排序长度的一半，</span><br><span class="line"> * 执行希尔插入排序</span><br><span class="line"> * 直到dk &lt; 1 (dk &#x3D;&#x3D; 0)为止</span><br><span class="line"> *&#x2F;</span><br><span class="line">    int dk&#x3D;LEN&#x2F;2;</span><br><span class="line">    while(dk &gt;&#x3D; 1) &#123;</span><br><span class="line">        Shell_Insert_Sort(n, dk);</span><br><span class="line">        dk&#x2F;&#x3D;2;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">void Quick_Sort(int *n, int first, int last)</span><br><span class="line">&#123;</span><br><span class="line">&#x2F;* 快速排序</span><br><span class="line"> * 1.从首个元素开始进行调整（见代码），将其放到合适的位置，</span><br><span class="line"> * 2.使该数左边的数全部比该数小（等于），该数右边的数全部比该数大（等于）</span><br><span class="line"> * 3.以该数为分割点，将该数组分割为左右两个数组</span><br><span class="line"> * 4.将左右两个数组分别执行1到3步，直到全部有序为止</span><br><span class="line"> *&#x2F;</span><br><span class="line">    if(first &gt; last)</span><br><span class="line">        return;</span><br><span class="line">    int low &#x3D; first;</span><br><span class="line">    int high &#x3D; last;</span><br><span class="line">    int t &#x3D; n[low];</span><br><span class="line">    while(low &lt; high) &#123;</span><br><span class="line">        while(low &lt; high &amp;&amp; n[high] &gt;&#x3D; t)</span><br><span class="line">            high--;</span><br><span class="line">        n[low] &#x3D; n[high];</span><br><span class="line">        while(low &lt; high &amp;&amp; n[low] &lt;&#x3D; t )</span><br><span class="line">            low++;</span><br><span class="line">        n[high] &#x3D; n[low];</span><br><span class="line">    &#125;</span><br><span class="line">    n[low] &#x3D; t;</span><br><span class="line">    Quick_Sort(n, 0, low-1);</span><br><span class="line">    Quick_Sort(n, low+1, last);</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">void Merge_Array(int *n,int *tmp,int first,int mid,int last)</span><br><span class="line">&#123;</span><br><span class="line">&#x2F;* 归并数组</span><br><span class="line"> * 将两个有序数组合成为一个有序数组</span><br><span class="line"> *</span><br><span class="line"> *&#x2F;</span><br><span class="line">    int i &#x3D; first, j &#x3D; mid+1, k&#x3D;0;</span><br><span class="line">    while(i &lt;&#x3D; mid &amp;&amp; j &lt;&#x3D; last)</span><br><span class="line">        if(n[i] &lt;&#x3D; n[j])</span><br><span class="line">            tmp[k++] &#x3D; n[i++];</span><br><span class="line">        else</span><br><span class="line">            tmp[k++] &#x3D; n[j++];</span><br><span class="line">    while(i &lt;&#x3D; mid)</span><br><span class="line">        tmp[k++] &#x3D; n[i++];</span><br><span class="line">    while(j &lt;&#x3D; last)</span><br><span class="line">        tmp[k++] &#x3D; n[j++];</span><br><span class="line">    memcpy(n+first,tmp,(k)*sizeof(int));  &#x2F;&#x2F; 将归并后的数组拷贝到n中</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">void Merge_Sort(int *n,int *tmp,int first,int last)</span><br><span class="line">&#123;</span><br><span class="line">&#x2F;* 归并排序</span><br><span class="line"> * 将数组分割成以一个元素为数组，并依次归并这些数组</span><br><span class="line"> * 然后分割成以两个元素为一个数组，并两两数组归并</span><br><span class="line"> * 然后4个一组，以此类推</span><br><span class="line"> *&#x2F;</span><br><span class="line">    if( first &lt; last )</span><br><span class="line">    &#123;</span><br><span class="line">        int mid &#x3D; (first + last)&#x2F;2; &#x2F;&#x2F;</span><br><span class="line">        Merge_Sort(n,tmp,first,mid);</span><br><span class="line">        Merge_Sort(n,tmp,mid+1,last);</span><br><span class="line">        Merge_Array(n,tmp,first,mid,last);</span><br><span class="line">    &#125;   </span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
