pan><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br><span class="line">89</span><br><span class="line">90</span><br><span class="line">91</span><br><span class="line">92</span><br><span class="line">93</span><br><span class="line">94</span><br><span class="line">95</span><br><span class="line">96</span><br><span class="line">97</span><br><span class="line">98</span><br><span class="line">99</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">/*************************************************************************</span></span><br><span class="line"><span class="comment">    &gt; File Name: stack.c</span></span><br><span class="line"><span class="comment">    &gt; Author: Netcan</span></span><br><span class="line"><span class="comment">    &gt; Mail: 1469709759@qq.com</span></span><br><span class="line"><span class="comment">    &gt; Created Time: 2014/12/21 9:39:37</span></span><br><span class="line"><span class="comment"> ************************************************************************/</span></span><br><span class="line"></span><br><span class="line"><span class="meta">#<span class="meta-keyword">include</span><span class="meta-string">&lt;stdio.h&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="meta-keyword">include</span><span class="meta-string">&lt;malloc.h&gt;</span></span></span><br><span class="line"></span><br><span class="line"><span class="class"><span class="keyword">struct</span> <span class="title">Node</span> &#123;</span>  <span class="comment">// 定义节点</span></span><br><span class="line">    <span class="keyword">int</span> data;</span><br><span class="line">    Node * pNext;</span><br><span class="line">&#125;;</span><br><span class="line"></span><br><span class="line"><span class="class"><span class="keyword">struct</span> <span class="title">Stack</span> &#123;</span> <span class="comment">// 定义栈</span></span><br><span class="line">    Node *pTop; <span class="comment">// 栈顶指针</span></span><br><span class="line">    Node *pBottom; <span class="comment">// 栈底指针</span></span><br><span class="line">&#125;;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">init_Stack</span><span class="params">(Stack *S)</span></span>; <span class="comment">// 初始化栈</span></span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">traverse_Stack</span><span class="params">(Stack *S)</span></span>; <span class="comment">// 遍历栈</span></span><br><span class="line"><span class="function"><span class="keyword">bool</span> <span class="title">push_Stack</span><span class="params">(Stack *S,<span class="keyword">int</span> val)</span></span>; <span class="comment">// 压栈</span></span><br><span class="line"><span class="function"><span class="keyword">bool</span> <span class="title">pop_Stack</span><span class="params">(Stack *S)</span></span>; <span class="comment">// 出栈</span></span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">clear_Stack</span><span class="params">(Stack *S)</span></span>; <span class="comment">// 清空栈</span></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">int</span> <span class="title">main</span><span class="params">()</span> </span>&#123;</span><br><span class="line">    Stack S; <span class="comment">// 声明一个栈</span></span><br><span class="line">    init_Stack(&amp;S); <span class="comment">// 初始化</span></span><br><span class="line">    push_Stack(&amp;S,<span class="number">0</span>); <span class="comment">// 压栈测试</span></span><br><span class="line">    push_Stack(&amp;S,<span class="number">1</span>);</span><br><span class="line">    push_Stack(&amp;S,<span class="number">2</span>);</span><br><span class="line">    push_Stack(&amp;S,<span class="number">3</span>);</span><br><span class="line">    push_Stack(&amp;S,<span class="number">4</span>);</span><br><span class="line">    push_Stack(&amp;S,<span class="number">5</span>);</span><br><span class="line">    push_Stack(&amp;S,<span class="number">6</span>);</span><br><span class="line">    push_Stack(&amp;S,<span class="number">7</span>);</span><br><span class="line">    push_Stack(&amp;S,<span class="number">8</span>);</span><br><span class="line">    push_Stack(&amp;S,<span class="number">9</span>);</span><br><span class="line">    traverse_Stack(&amp;S); <span class="comment">// 遍历</span></span><br><span class="line">    pop_Stack(&amp;S); <span class="comment">// 出栈测试</span></span><br><span class="line">    pop_Stack(&amp;S);</span><br><span class="line">    traverse_Stack(&amp;S);</span><br><span class="line">    clear_Stack(&amp;S); <span class="comment">// 清空栈测试</span></span><br><span class="line">    traverse_Stack(&amp;S);</span><br><span class="line"></span><br><span class="line">    <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">init_Stack</span><span class="params">(Stack *S)</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">    S-&gt;pBottom = (Node *)<span class="built_in">malloc</span>(<span class="keyword">sizeof</span>(Node)); <span class="comment">// 分配一个新结点给栈顶和栈底</span></span><br><span class="line">    S-&gt;pTop = S-&gt;pBottom;</span><br><span class="line">    S-&gt;pBottom-&gt;pNext = <span class="literal">NULL</span>; <span class="comment">// 栈底的不指向其他节点</span></span><br><span class="line">    <span class="keyword">return</span>;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">traverse_Stack</span><span class="params">(Stack *S)</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">    Node * p = S-&gt;pTop;  <span class="comment">// 遍历用的指针</span></span><br><span class="line">    <span class="keyword">while</span>( p != S-&gt;pBottom )&#123; <span class="comment">// 如果没遍历到栈底</span></span><br><span class="line">        <span class="built_in">printf</span>(<span class="string">&quot;%3d&quot;</span>,p-&gt;data);</span><br><span class="line">        p = p-&gt;pNext;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="built_in">puts</span>(<span class="string">&quot;&quot;</span>);</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">bool</span> <span class="title">push_Stack</span><span class="params">(Stack *S,<span class="keyword">int</span> val)</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">    Node *pNew = (Node*)<span class="built_in">malloc</span>(<span class="keyword">sizeof</span>(Node)); <span class="comment">// 分配一个新节点</span></span><br><span class="line">    <span class="keyword">if</span>( pNew == <span class="literal">NULL</span> ) <span class="comment">// 如果分配失败</span></span><br><span class="line">        <span class="keyword">return</span> <span class="literal">false</span>;</span><br><span class="line">    pNew-&gt;data = val; <span class="comment">// 节点赋值</span></span><br><span class="line">    pNew-&gt;pNext = S-&gt;pTop; <span class="comment">// 使新节点成为栈顶</span></span><br><span class="line">    S-&gt;pTop = pNew;</span><br><span class="line">    <span class="keyword">return</span> <span class="literal">true</span>;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">bool</span> <span class="title">pop_Stack</span><span class="params">(Stack *S)</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">    <span class="keyword">if</span>(S-&gt;pTop == S-&gt;pBottom) <span class="comment">// 如果栈为空则不必出栈</span></span><br><span class="line">        <span class="keyword">return</span> <span class="literal">false</span>;</span><br><span class="line">    Node *p = S-&gt;pTop; <span class="comment">// 使p指向栈顶，为了释放栈顶节点</span></span><br><span class="line">    S-&gt;pTop = p-&gt;pNext; <span class="comment">// 栈顶下移</span></span><br><span class="line">    <span class="built_in">free</span>(p); <span class="comment">// 释放</span></span><br><span class="line">    p = <span class="literal">NULL</span>;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">clear_Stack</span><span class="params">(Stack *S)</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line"><span class="comment">//  while( pop_Stack(S));  其实可以这样写。。。一直出栈直到栈为空</span></span><br><span class="line">    Node * p = S-&gt;pTop; <span class="comment">// p一直指向栈顶</span></span><br><span class="line">    <span class="keyword">while</span>( S-&gt;pTop != S-&gt;pBottom ) &#123; <span class="comment">// 如果栈顶还没到栈底就继续释放</span></span><br><span class="line">        S-&gt;pTop = p-&gt;pNext; <span class="comment">// 栈顶下移</span></span><br><span class="line">        <span class="built_in">free</span>(p); <span class="comment">//释放</span></span><br><span class="line">        p = S-&gt;pTop;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
