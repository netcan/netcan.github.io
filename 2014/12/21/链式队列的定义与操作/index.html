">123</span><br><span class="line">124</span><br><span class="line">125</span><br><span class="line">126</span><br><span class="line">127</span><br><span class="line">128</span><br><span class="line">129</span><br><span class="line">130</span><br><span class="line">131</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">/*************************************************************************</span></span><br><span class="line"><span class="comment">    &gt; File Name: queue.c</span></span><br><span class="line"><span class="comment">    &gt; Author: Netcan</span></span><br><span class="line"><span class="comment">    &gt; Mail: 1469709759@qq.com</span></span><br><span class="line"><span class="comment">    &gt; Created Time: 2014/12/21 20:10:02</span></span><br><span class="line"><span class="comment"> ************************************************************************/</span></span><br><span class="line"></span><br><span class="line"><span class="meta">#<span class="meta-keyword">include</span><span class="meta-string">&lt;stdio.h&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="meta-keyword">include</span><span class="meta-string">&lt;malloc.h&gt;</span></span></span><br><span class="line"></span><br><span class="line"><span class="class"><span class="keyword">struct</span> <span class="title">Node</span> &#123;</span> <span class="comment">// 定义节点</span></span><br><span class="line">    <span class="keyword">int</span> data;</span><br><span class="line">    Node * pNext;</span><br><span class="line">&#125;;</span><br><span class="line"><span class="class"><span class="keyword">struct</span> <span class="title">Queue</span> &#123;</span> <span class="comment">// 定义队列，这里的pHead是头指针，不是首指针，指向无效节点</span></span><br><span class="line">    Node * pHead;</span><br><span class="line">    Node * pTail;</span><br><span class="line">&#125;;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">init_Queue</span><span class="params">(Queue *Q)</span></span>; <span class="comment">// 初始化队列</span></span><br><span class="line"><span class="function"><span class="keyword">bool</span> <span class="title">in_Queue</span><span class="params">(Queue *Q,<span class="keyword">int</span> val)</span></span>; <span class="comment">// 入队</span></span><br><span class="line"><span class="function"><span class="keyword">bool</span> <span class="title">out_Queue</span><span class="params">(Queue *Q)</span></span>; <span class="comment">// 出队</span></span><br><span class="line"><span class="function"><span class="keyword">bool</span> <span class="title">is_empty_Queue</span><span class="params">(Queue *Q)</span></span>; <span class="comment">// 判断队列是否为空</span></span><br><span class="line"><span class="function"><span class="keyword">int</span> <span class="title">length_Queue</span><span class="params">(Queue *Q)</span></span>; <span class="comment">// 队列长度</span></span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">traverse_Queue</span><span class="params">(Queue *Q)</span></span>; <span class="comment">// 遍历队列= =检测队列用的</span></span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">clear_Queue</span><span class="params">(Queue *Q)</span></span>; <span class="comment">// 清空队列</span></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">int</span> <span class="title">main</span><span class="params">()</span> </span>&#123;</span><br><span class="line">    Queue Q; <span class="comment">// 声明队列</span></span><br><span class="line">    init_Queue(&amp;Q); <span class="comment">// 初始化</span></span><br><span class="line">    in_Queue(&amp;Q,<span class="number">0</span>); <span class="comment">// 入队</span></span><br><span class="line">    in_Queue(&amp;Q,<span class="number">1</span>);</span><br><span class="line">    in_Queue(&amp;Q,<span class="number">2</span>);</span><br><span class="line">    in_Queue(&amp;Q,<span class="number">3</span>);</span><br><span class="line">    in_Queue(&amp;Q,<span class="number">4</span>);</span><br><span class="line">    in_Queue(&amp;Q,<span class="number">5</span>);</span><br><span class="line">    in_Queue(&amp;Q,<span class="number">6</span>);</span><br><span class="line">    in_Queue(&amp;Q,<span class="number">7</span>);</span><br><span class="line">    in_Queue(&amp;Q,<span class="number">8</span>);</span><br><span class="line">    in_Queue(&amp;Q,<span class="number">9</span>);</span><br><span class="line">    traverse_Queue(&amp;Q); <span class="comment">// 遍历队列</span></span><br><span class="line">    <span class="built_in">printf</span>(<span class="string">&quot;Queue length: %d\n&quot;</span>, length_Queue(&amp;Q)); <span class="comment">// 输出当前队列长度</span></span><br><span class="line">    out_Queue(&amp;Q); <span class="comment">// 出队</span></span><br><span class="line">    out_Queue(&amp;Q);</span><br><span class="line">    traverse_Queue(&amp;Q);</span><br><span class="line">    <span class="built_in">printf</span>(<span class="string">&quot;Queue length: %d\n&quot;</span>, length_Queue(&amp;Q));</span><br><span class="line"></span><br><span class="line">    <span class="built_in">puts</span>(<span class="string">&quot;Clear Queue&quot;</span>);</span><br><span class="line">    clear_Queue(&amp;Q); <span class="comment">// 清空队列</span></span><br><span class="line">    <span class="built_in">printf</span>(<span class="string">&quot;Queue length: %d\n&quot;</span>, length_Queue(&amp;Q));</span><br><span class="line">    traverse_Queue(&amp;Q);</span><br><span class="line"></span><br><span class="line">    <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">init_Queue</span><span class="params">(Queue *Q)</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">    Q-&gt;pTail = (Node *)<span class="built_in">malloc</span>(<span class="keyword">sizeof</span>(Node)); <span class="comment">// 使尾指针指向新节点</span></span><br><span class="line">    Q-&gt;pTail-&gt;pNext = <span class="literal">NULL</span>; <span class="comment">// 尾指针指向下一个空节点</span></span><br><span class="line">    Q-&gt;pHead = Q-&gt;pTail; <span class="comment">// 当前头指针指向尾指针</span></span><br><span class="line">    <span class="keyword">return</span>;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">bool</span> <span class="title">is_empty_Queue</span><span class="params">(Queue *Q)</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">    <span class="keyword">if</span>(Q-&gt;pHead == Q-&gt;pTail) <span class="comment">// 只要头指针指向尾指针就为空</span></span><br><span class="line">        <span class="keyword">return</span> <span class="literal">true</span>;</span><br><span class="line">    <span class="keyword">else</span></span><br><span class="line">        <span class="keyword">return</span> <span class="literal">false</span>;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">int</span> <span class="title">length_Queue</span><span class="params">(Queue *Q)</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">    <span class="keyword">if</span>( is_empty_Queue(Q) )</span><br><span class="line">        <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">    <span class="keyword">int</span> len;</span><br><span class="line">    Node * p = Q-&gt;pHead-&gt;pNext;  <span class="comment">// p指向第一个有效节点</span></span><br><span class="line">    <span class="keyword">for</span>(len = <span class="number">1</span>; p != Q-&gt;pTail; len++, p = p-&gt;pNext); <span class="comment">// 计数，当队列不为空长度当然大于等于1</span></span><br><span class="line">    <span class="keyword">return</span> len;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">bool</span> <span class="title">in_Queue</span><span class="params">(Queue *Q,<span class="keyword">int</span> val)</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">    Node * pNew = (Node *)<span class="built_in">malloc</span>(<span class="keyword">sizeof</span>(Node)); <span class="comment">// 分配新节点</span></span><br><span class="line">    <span class="keyword">if</span>( <span class="literal">NULL</span> == pNew )</span><br><span class="line">        <span class="keyword">return</span> <span class="literal">false</span>;</span><br><span class="line">    pNew-&gt;data = val; <span class="comment">// 新节点的值为入队的值</span></span><br><span class="line">    pNew-&gt;pNext = <span class="literal">NULL</span>; <span class="comment">// 新节点从尾部插入则指向下一个空节点</span></span><br><span class="line">    Q-&gt;pTail-&gt;pNext = pNew; <span class="comment">// 当前尾指针后一个节点指向新节点</span></span><br><span class="line">    Q-&gt;pTail = pNew; <span class="comment">// 更新尾指针</span></span><br><span class="line">    <span class="keyword">return</span> <span class="literal">true</span>;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">bool</span> <span class="title">out_Queue</span><span class="params">(Queue *Q)</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">    <span class="keyword">if</span>(is_empty_Queue(Q))</span><br><span class="line">        <span class="keyword">return</span> <span class="literal">false</span>;</span><br><span class="line">    Node * p = Q-&gt;pHead; <span class="comment">// 使p指向头指针</span></span><br><span class="line">    Q-&gt;pHead = p-&gt;pNext;  <span class="comment">// 更新头指针，头指针下移</span></span><br><span class="line">    <span class="built_in">free</span>(p); <span class="comment">// 释放p</span></span><br><span class="line">    <span class="keyword">return</span> <span class="literal">true</span>;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">traverse_Queue</span><span class="params">(Queue *Q)</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">    <span class="keyword">if</span>(is_empty_Queue(Q))</span><br><span class="line">        <span class="keyword">return</span>;</span><br><span class="line">    Node *p = Q-&gt;pHead-&gt;pNext; <span class="comment">// 使p指向第一个有效节点</span></span><br><span class="line">    <span class="keyword">while</span>( p != Q-&gt;pTail-&gt;pNext ) &#123; <span class="comment">// 如果p没到队列最后一个节点就输出</span></span><br><span class="line">        <span class="built_in">printf</span>(<span class="string">&quot;%3d&quot;</span>,p-&gt;data);</span><br><span class="line">        p = p-&gt;pNext;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="built_in">puts</span>(<span class="string">&quot;&quot;</span>);</span><br><span class="line">    <span class="keyword">return</span>;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">clear_Queue</span><span class="params">(Queue *Q)</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">    <span class="keyword">if</span>(is_empty_Queue(Q))</span><br><span class="line">        <span class="keyword">return</span>;</span><br><span class="line">    Node *p = Q-&gt;pHead-&gt;pNext; <span class="comment">// 使p指向第一个有效节点</span></span><br><span class="line">    Node *q = p-&gt;pNext; <span class="comment">// q指向p指向的下一个节点</span></span><br><span class="line">    <span class="keyword">while</span>( q != Q-&gt;pTail-&gt;pNext ) &#123; <span class="comment">// 遍历节点，并清空</span></span><br><span class="line">        <span class="built_in">free</span>(p);</span><br><span class="line">        p=q;</span><br><span class="line">        q = p-&gt;pNext;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="built_in">free</span>(p); <span class="comment">// 尾节点清空</span></span><br><span class="line">    Q-&gt;pTail = Q-&gt;pHead; <span class="comment">// 重置尾指针</span></span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
