="function"><span class="keyword">void</span> <span class="title">inversionV</span><span class="params">(<span class="built_in">vector</span> *v)</span></span>; <span class="comment">// 倒置vector</span></span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">sortV</span><span class="params">(<span class="built_in">vector</span> *v)</span></span>; <span class="comment">// 冒泡排序vector</span></span><br><span class="line"><span class="function"><span class="keyword">int</span> <span class="title">getVEle</span><span class="params">(<span class="built_in">vector</span> *v,<span class="keyword">int</span> pos)</span></span>; <span class="comment">// 获取vector[pos-1]</span></span><br><span class="line"><span class="function"><span class="keyword">int</span> <span class="title">getVSize</span><span class="params">(<span class="built_in">vector</span> *s)</span></span>; <span class="comment">// 获取vector大小</span></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">int</span> <span class="title">main</span><span class="params">()</span> </span>&#123;</span><br><span class="line">    srand(<span class="keyword">int</span>(time(<span class="number">0</span>)));</span><br><span class="line">    <span class="built_in">vector</span> v;</span><br><span class="line">    initV(&amp;v);</span><br><span class="line">    <span class="keyword">for</span>(<span class="keyword">int</span> i=<span class="number">0</span>;i&lt;<span class="number">50</span>;i++)</span><br><span class="line">        appendV(&amp;v,rand()%<span class="number">100</span>); <span class="comment">// 测试追加和自动增长内存</span></span><br><span class="line">    <span class="built_in">printf</span>(<span class="string">&quot;vector size: %d\n&quot;</span>, getVSize(&amp;v));</span><br><span class="line">    showV(&amp;v); <span class="comment">// 测试输出</span></span><br><span class="line">    <span cl
