pan><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br><span class="line">89</span><br><span class="line">90</span><br><span class="line">91</span><br><span class="line">92</span><br><span class="line">93</span><br><span class="line">94</span><br><span class="line">95</span><br><span class="line">96</span><br><span class="line">97</span><br><span class="line">98</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">/*************************************************************************</span></span><br><span class="line"><span class="comment">    &gt; File Name: queue_2.c</span></span><br><span class="line"><span class="comment">    &gt; Author: Netcan</span></span><br><span class="line"><span class="comment">    &gt; Mail: 1469709759@qq.com</span></span><br><span class="line"><span class="comment">    &gt; Created Time: 2014/12/23 16:09:30</span></span><br><span class="line"><span class="comment"> ************************************************************************/</span></span><br><span class="line"></span><br><span class="line"><span class="meta">#<span class="meta-keyword">include</span><span class="meta-string">&lt;stdio.h&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="meta-keyword">include</span><span class="meta-string">&lt;malloc.h&gt;</span></span></span><br><span class="line"></span><br><span class="line"><span class="class"><span class="keyword">struct</span> <span class="title">Queue</span> &#123;</span> <span class="comment">// 定义一个环形队列（静态队列）</span></span><br><span class="line">    <span class="keyword">int</span> * pBase; <span class="comment">// 存放数据的数组</span></span><br><span class="line">    <span class="keyword">int</span> front; <span class="comment">// 队列首下标</span></span><br><span class="line">    <span class="keyword">int</span> rear; <span class="comment">// 队列尾下标，指向最后一个有效数据的后一个</span></span><br><span class="line">    <span class="keyword">int</span> size; <span class="comment">// 队列大小</span></span><br><span class="line">&#125;;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">init_Queue</span><span class="params">(Queue *Q)</span></span>; <span class="comment">// 初始化队列</span></span><br><span class="line"><span class="function"><span class="keyword">bool</span> <span class="title">is_empty_Queue</span><span class="params">(Queue *Q)</span></span>; <span class="comment">// 检测队列是否为空</span></span><br><span class="line"><span class="function"><span class="keyword">bool</span> <span class="title">is_full_Queue</span><span class="params">(Queue *Q)</span></span>; <span class="comment">// 检测队列是否满</span></span><br><span class="line"><span class="function"><span class="keyword">bool</span> <span class="title">in_Queue</span><span class="params">(Queue *Q, <span class="keyword">int</span> val)</span></span>; <span class="comment">// 入队</span></span><br><span class="line"><span class="function"><span class="keyword">bool</span> <span class="title">out_Queue</span><span class="params">(Queue *Q)</span></span>; <span class="comment">// 出队</span></span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">traverse_Queue</span><span class="params">(Queue *Q)</span></span>; <span class="comment">// 遍历队列</span></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">int</span> <span class="title">main</span><span class="params">()</span> </span>&#123;</span><br><span class="line">    Queue Q; <span class="comment">// 声明一个队列</span></span><br><span class="line">    init_Queue(&amp;Q); <span class="comment">// 初始化</span></span><br><span class="line">    <span class="keyword">if</span>(is_empty_Queue(&amp;Q)) <span class="comment">// 检测队列是否为空</span></span><br><span class="line">        <span class="built_in">puts</span>(<span class="string">&quot;Queue empty.&quot;</span>);</span><br><span class="line">    in_Queue(&amp;Q, <span class="number">0</span>); <span class="comment">// 入队</span></span><br><span class="line">    in_Queue(&amp;Q, <span class="number">1</span>);</span><br><span class="line">    in_Queue(&amp;Q, <span class="number">2</span>);</span><br><span class="line">    in_Queue(&amp;Q, <span class="number">3</span>);</span><br><span class="line">    in_Queue(&amp;Q, <span class="number">4</span>);</span><br><span class="line">    in_Queue(&amp;Q, <span class="number">5</span>);</span><br><span class="line">    in_Queue(&amp;Q, <span class="number">6</span>);</span><br><span class="line">    in_Queue(&amp;Q, <span class="number">7</span>);</span><br><span class="line">    in_Queue(&amp;Q, <span class="number">8</span>);</span><br><span class="line">    in_Queue(&amp;Q, <span class="number">9</span>);</span><br><span class="line">    <span class="keyword">if</span>(is_full_Queue(&amp;Q)) <span class="comment">// 检测队列是否满</span></span><br><span class="line">        <span class="built_in">puts</span>(<span class="string">&quot;Queue full.&quot;</span>);</span><br><span class="line">    traverse_Queue(&amp;Q); <span class="comment">// 输出队列</span></span><br><span class="line">    out_Queue(&amp;Q); <span class="comment">// 出队</span></span><br><span class="line">    out_Queue(&amp;Q);</span><br><span class="line">    traverse_Queue(&amp;Q);</span><br><span class="line"></span><br><span class="line">    <span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">init_Queue</span><span class="params">(Queue *Q)</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">    Q-&gt;size = <span class="number">11</span>; <span class="comment">// 设队列大小为11</span></span><br><span class="line">    Q-&gt;pBase = (<span class="keyword">int</span> *)<span class="built_in">malloc</span>(<span class="keyword">sizeof</span>(<span class="keyword">int</span>)*Q-&gt;size); <span class="comment">// 分配内存用于存储数据</span></span><br><span class="line">    Q-&gt;rear = Q-&gt;front = <span class="number">0</span>; <span class="comment">// 初始化首尾下标</span></span><br><span class="line">    <span class="keyword">return</span>;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">bool</span> <span class="title">is_empty_Queue</span><span class="params">(Queue *Q)</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">    <span class="keyword">if</span>(Q-&gt;front == Q-&gt;rear) <span class="comment">// 如果首尾下标相等则空</span></span><br><span class="line">        <span class="keyword">return</span> <span class="literal">true</span>;</span><br><span class="line">    <span class="keyword">else</span></span><br><span class="line">        <span class="keyword">return</span> <span class="literal">false</span>;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">bool</span> <span class="title">is_full_Queue</span><span class="params">(Queue *Q)</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">    <span class="keyword">if</span>( (Q-&gt;rear + <span class="number">1</span>)%Q-&gt;size == Q-&gt;front ) <span class="comment">// 如果尾下标的下一个是首下标则满</span></span><br><span class="line">        <span class="keyword">return</span> <span class="literal">true</span>;</span><br><span class="line">    <span class="keyword">else</span></span><br><span class="line">        <span class="keyword">return</span> <span class="literal">false</span>;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">bool</span> <span class="title">in_Queue</span><span class="params">(Queue *Q, <span class="keyword">int</span> val)</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">    <span class="keyword">if</span>( is_full_Queue(Q) ) <span class="comment">// 满的话就不能入队</span></span><br><span class="line">        <span class="keyword">return</span> <span class="literal">false</span>;</span><br><span class="line">    Q-&gt;pBase[Q-&gt;rear] = val; <span class="comment">// 入队</span></span><br><span class="line">    Q-&gt;rear = (Q-&gt;rear + <span class="number">1</span>)%Q-&gt;size; <span class="comment">// 尾下标后移</span></span><br><span class="line">    <span class="keyword">return</span> <span class="literal">true</span>;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">bool</span> <span class="title">out_Queue</span><span class="params">(Queue *Q)</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">    <span class="keyword">if</span>( is_empty_Queue(Q) ) <span class="comment">// 如果空的话就不能出队</span></span><br><span class="line">        <span class="keyword">return</span> <span class="literal">false</span>;</span><br><span class="line">    Q-&gt;front = (Q-&gt;front + <span class="number">1</span>) % Q-&gt;size; <span class="comment">// 首下标后移表示出队</span></span><br><span class="line">    <span class="keyword">return</span> <span class="literal">true</span>;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">void</span> <span class="title">traverse_Queue</span><span class="params">(Queue *Q)</span></span></span><br><span class="line"><span class="function"></span>&#123;</span><br><span class="line">    <span class="keyword">for</span>(<span class="keyword">int</span> i = Q-&gt;front; i != Q-&gt;rear; i = (i+<span class="number">1</span>)%Q-&gt;size) <span class="comment">// i用于输出元素的下标，当i等于尾下标输出结束</span></span><br><span class="line">        <span class="built_in">printf</span>(<span class="string">&quot;%3d&quot;</span>,Q-&gt;pBase[i]);</span><br><span class="line">    <span class="built_in">puts</span>(<span class="string">&quot;&quot;</span>);</span><br><span class="line">    <span class="keyword">return</span>;</span><br><span class="line">&#125;</span><br><span class="line"></span><br></pre></td></tr></table></figure>
